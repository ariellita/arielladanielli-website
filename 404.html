<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הדף לא נמצא | אריאלה דניאלי</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Rubik:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#FF5A1F;
  --text:#1E3CFF;
  --font:'Assistant', sans-serif;
  --font-head:'Rubik', sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--font);
  background:linear-gradient(160deg,#fff8fb 0%,#fde8f0 60%,#f8e0ee 100%);
  color:var(--text);
  direction:rtl;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
}
.wrap{max-width:480px}
h1{
  font-family:var(--font-head);
  font-weight:900;
  font-size:clamp(48px,10vw,96px);
  color:var(--orange);
  line-height:1;
  margin-bottom:16px;
}
p{font-size:18px;line-height:1.7;margin-bottom:28px}
a.btn{
  display:inline-block;
  background:var(--orange);
  color:#fff;
  font-weight:700;
  padding:14px 32px;
  border-radius:100px;
  transition:opacity .2s;
}
a.btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <h1>404</h1>
  <p>הדף שחיפשת לא נמצא. אולי הכתובת השתנתה או שנפלה טעות בהקלדה.</p>
  <a class="btn" href="/">חזרה לדף הבית</a>
</div>
</body>
</html>
