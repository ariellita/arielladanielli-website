<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ההרשמה הושלמה! | מיתוג אישי בעידן ה-AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;900&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0c;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      direction: rtl;
    }

    .card {
      background: #161618;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .emoji { font-size: 3.5rem; margin-bottom: 1.2rem; }

    h1 {
      font-family: 'Rubik', sans-serif;
      font-size: 1.9rem;
      color: #00D68F;
      margin-bottom: .7rem;
    }

    .subtitle {
      color: rgba(255,255,255,.6);
      font-size: .97rem;
      line-height: 1.7;
      margin-bottom: 2.2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.08);
      margin-bottom: 2rem;
    }

    .cal-title {
      font-size: 1rem;
      font-weight: 700;
      color: rgba(255,255,255,.85);
      margin-bottom: 1.2rem;
    }

    .cal-options {
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    .cal-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .9rem 1.5rem;
      border-radius: 14px;
      font-size: 1rem;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity .2s, transform .15s;
    }
    .cal-btn:hover { opacity: .88; transform: translateY(-2px); }

    .btn-google  { background: #1A2BFF; color: #fff; }
    .btn-ics     { background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.15); }

    .back {
      display: block;
      margin-top: 2rem;
      color: rgba(255,255,255,.3);
      font-size: .83rem;
      text-decoration: none;
    }
    .back:hover { color: rgba(255,255,255,.6); }

    .event-info {
      background: rgba(0,214,143,.06);
      border: 1px solid rgba(0,214,143,.2);
      border-radius: 12px;
      padding: .9rem 1.2rem;
      margin-bottom: 2rem;
      font-size: .9rem;
      color: rgba(255,255,255,.7);
      line-height: 1.8;
    }
    .event-info strong { color: #00D68F; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>ברוכים הבאים לסדנה!</h1>
    <p class="subtitle">ההרשמה הושלמה בהצלחה. קבלה תישלח אליכם למייל.</p>

    <div class="event-info">
      <strong>וובינר מיתוג אישי בעידן ה-AI</strong><br>
      יום שני, 22.6.2026 · 10:00–12:00<br>
      עם אריאלה דניאלי ושרון מס · Zoom
    </div>

    <hr class="divider">

    <p class="cal-title">📅 הוסיפו את הסדנה ליומן שלכם</p>

    <div class="cal-options">
      <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=%D7%95%D7%95%D7%91%D7%99%D7%A0%D7%A8+%D7%9E%D7%99%D7%AA%D7%95%D7%92+%D7%90%D7%99%D7%A9%D7%99+%D7%A2%D7%9D+%D7%91%D7%99%D7%A0%D7%94+%D7%9E%D7%9C%D7%90%D7%9B%D7%95%D7%AA%D7%99%D7%AA+%D7%A2%D7%9D+%D7%A9%D7%A8%D7%95%D7%9F+%D7%9E%D7%A1+%D7%95%D7%90%D7%A8%D7%99%D7%90%D7%9C%D7%94+%D7%93%D7%A0%D7%99%D7%90%D7%9C%D7%99&dates=20260622T070000Z%2F20260622T090000Z&details=%D7%A1%D7%93%D7%A0%D7%AA+%D7%9E%D7%99%D7%AA%D7%95%D7%92+%D7%90%D7%99%D7%A9%D7%99+%D7%91%D7%A2%D7%99%D7%93%D7%9F+%D7%94-AI&location=Zoom" target="_blank" class="cal-btn btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        הוסף ל-Google Calendar
      </a>

      <a href="webinar.ics" download class="cal-btn btn-ics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Apple Calendar / Outlook (.ics)
      </a>
    </div>

    <a href="personal-branding" class="back">← חזרה לדף הסדנה</a>
  </div>
</body>
</html>
